name: weekly-wb-market

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: deco-watch-data
  cancel-in-progress: false

jobs:
  wb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh weekly WB market data
        run: python scraper.py --no-push

      - name: Commit snapshots and report
        run: |
          git config user.name "deco-watch-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/snapshot.json data/wb_latest.json data/latest_report.md data/status.json data/history/
          git commit -m "weekly WB snapshot $(date -u +%F)" || echo "no changes"
          git push || echo "nothing to push"
